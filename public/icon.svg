<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and shadows -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Emerald Glow Gradient -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Metallic Dark Shield Border -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Emerald Glow Filter -->
    <filter id="emerald-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Square Background (with rounded corners for mask compatibility) -->
  <rect width="512" height="512" fill="url(#bg-grad)" rx="112" />

  <!-- Outer Ring Accent -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#1e293b" stroke-width="2.5" opacity="0.6" />

  <!-- Subtle grid pattern in background -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.03">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />
    
    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Glowing Aura Backing the Shield -->
  <circle cx="256" cy="245" r="110" fill="#10b981" opacity="0.08" filter="url(#emerald-glow)" />

  <!-- Main Shield Shape -->
  <!-- Formula: Start center top, curve to top-right, down sides, taper and curve to point at bottom, mirror left -->
  <path d="M 256,110 
           C 340,110 375,130 395,150
           C 400,230 385,320 256,400
           C 127,320 112,230 117,150
           C 137,130 172,110 256,110 Z" 
        fill="url(#shield-grad)" 
        stroke="#334155" 
        stroke-width="12" 
        stroke-linejoin="round" />

  <!-- Inner Glowing Emerald Shield Overlay -->
  <path d="M 256,128 
           C 324,128 354,144 372,160
           C 376,225 363,295 256,365
           C 149,295 136,225 140,160
           C 158,144 188,128 256,128 Z" 
        fill="none" 
        stroke="url(#glow-grad)" 
        stroke-width="5" 
        stroke-dasharray="8 4" 
        opacity="0.35" />

  <!-- Centered Futuristic Emerald Checkmark Logo -->
  <g filter="url(#emerald-glow)">
    <path d="M 185,250 
             L 235,300 
             L 330,205" 
          fill="none" 
          stroke="url(#glow-grad)" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- Little Lock Shackle Core Detail (Cybersecurity Indicator) -->
  <path d="M 220,190 C 220,170 236,155 256,155 C 276,155 292,170 292,190" 
        fill="none" 
        stroke="#10b981" 
        stroke-width="6" 
        stroke-linecap="round" 
        opacity="0.5" />
</svg>
